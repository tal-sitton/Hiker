<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מפת טרקים</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h1>טרקים</h1>
                <button id="minimizeBtn" class="minimize-btn" title="הסתר סרגל צד">◀</button>
            </div>

            <div class="mobile-tabs">
                <button class="tab-btn active" onclick="switchTab('filters')">מסננים</button>
                <button class="tab-btn" onclick="switchTab('hikes')">טרקים</button>
            </div>

            <div class="filter-section" id="filtersTab">
                <div class="section-header" onclick="toggleSection('lengthSection')">
                    <h3>אורך (ק"מ)</h3>
                    <span class="toggle-icon">▼</span>
                </div>
                <div id="lengthSection" class="section-content">
                    <input type="range" id="lengthMin" min="0" max="100" value="0">
                    <input type="range" id="lengthMax" min="0" max="100" value="100">
                    <div class="length-display">
                        <span id="lengthDisplay">0 - 100</span> ק"מ
                    </div>
                </div>

                <div class="section-header" onclick="toggleSection('tagsSection')">
                    <h3>תגיות</h3>
                    <span class="toggle-icon">▼</span>
                </div>
                <div id="tagsSection" class="section-content">
                    <div id="tagFilter" class="tag-filter"></div>
                </div>

                <button id="resetFilters" class="btn-reset">אפס מסננים</button>
            </div>

            <div class="hikes-list" id="hikesTab">
                <h3>טרקים (<span id="hikeCount">0</span>)</h3>
                <div class="sort-controls">
                    <label for="sortBy">מיין לפי:</label>
                    <select id="sortBy" onchange="applyFilters()">
                        <option value="name">שם</option>
                        <option value="length">אורך</option>
                        <option value="difficulty">קושי</option>
                        <option value="north-south">צפון לדרום</option>
                    </select>
                </div>
                <ul id="hikesList"></ul>
            </div>
        </div>

        <button id="expandBtn" class="expand-btn" style="display: none;" title="הרחב סרגל צד">▶</button>

        <div class="map-container">
            <div id="map"></div>
        </div>
    </div>

    <div id="popup" class="popup">
        <div class="popup-content">
            <span class="popup-close">&times;</span>
            <h3 id="popupTitle"></h3>
            <p><strong>קושי:</strong> <span id="popupDifficulty"></span></p>
            <p><strong>אורך:</strong> <span id="popupLength"></span> ק"מ</p>
            <p><strong>תגיות:</strong> <span id="popupTags"></span></p>
            <p><strong>מקור:</strong> <a id="popupSource" target="_blank" rel="noopener noreferrer"></a></p>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
